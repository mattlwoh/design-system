<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lantern OS — Today</title>
  <link rel="icon" href="../../assets/logo/favicon.svg">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    /* =========================================================
       Lantern OS — UI kit shell
       Generous space. Recessed sidebar. Cinematic hero blocks.
       Color held back, then released in one place per page.
       ========================================================= */

    html, body { height: 100%; }
    body { margin: 0; }
    #root { min-height: 100vh; }

    .app {
      display: grid;
      grid-template-columns: 232px 1fr;
      min-height: 100vh;
      background: var(--bg-page);
    }

    /* ---------- Sidebar (recessed — same canvas as content) ---------- */
    .sb {
      padding: 28px 18px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      background: transparent;
    }
    .sb-brand {
      display: flex; align-items: center; gap: 12px;
      padding: 4px 10px 28px;
      white-space: nowrap;
    }
    .sb-brand .wm {
      font-family: var(--font-display);
      font-size: 22px;
      color: var(--fg-1);
      letter-spacing: -0.015em;
      font-weight: 600;
    }
    .sb-group {
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--fg-3);
      padding: 18px 10px 8px;
      font-weight: 500;
    }
    .sb-item {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 10px;
      border-radius: 10px;
      font-size: 14px;
      color: var(--fg-2);
      cursor: pointer;
      transition: color var(--dur-fast) var(--ease-calm), background var(--dur-fast) var(--ease-calm);
      border: none; background: transparent;
      text-align: left; width: 100%;
      font-family: var(--font-sans);
      font-weight: 500;
    }
    .sb-item:hover { color: var(--fg-1); }
    .sb-item.active {
      color: var(--fg-1);
      background: var(--bg-surface);
    }
    .sb-item.active .ind {
      width: 4px;
      background: var(--primary);
    }
    .sb-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.9; }
    .sb-count {
      margin-left: auto;
      font-size: 12px; color: var(--fg-3); font-weight: 500;
    }
    .sb-item.active .sb-count { color: var(--primary); }

    .sb-bottom {
      margin-top: auto;
      padding: 16px 10px 0;
      display: flex; align-items: center; gap: 12px;
    }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 999px;
      background: var(--primary);
      color: var(--fg-on-primary);
      display: grid; place-items: center;
      font-size: 13px; font-weight: 600;
      font-family: var(--font-sans);
    }
    .me { font-size: 13px; color: var(--fg-1); line-height: 1.25; font-weight: 500; }
    .me .sub { font-size: 12px; color: var(--fg-3); font-weight: 400; margin-top: 1px; }

    /* ---------- Main content area ---------- */
    .main {
      display: flex; flex-direction: column;
      min-width: 0;
      background: var(--bg-surface);
      border-top-left-radius: 24px;
      border-bottom-left-radius: 0;
      margin-top: 12px;
      margin-bottom: 0;
      border-left: 1px solid var(--border-1);
      border-top: 1px solid var(--border-1);
    }

    /* ---------- Top bar ---------- */
    .topbar {
      height: 64px;
      display: flex; align-items: center; padding: 0 40px;
      gap: 16px;
      position: sticky; top: 0; z-index: 5;
      background: var(--bg-surface);
      border-top-left-radius: 24px;
    }
    .crumbs {
      font-size: 13px;
      color: var(--fg-2);
      font-weight: 400;
    }
    .crumbs strong {
      color: var(--fg-1);
      font-weight: 500;
    }
    .topbar-greet {
      font-family: var(--font-display);
      font-size: 16px;
      color: var(--fg-1);
      font-weight: 500;
    }
    .topbar-greet em {
      font-style: italic;
      color: var(--fg-3);
      font-weight: 400;
      margin-left: 4px;
    }
    .search {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-inset);
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 9px 14px;
      width: 260px;
      color: var(--fg-3);
      font-size: 13px;
      transition: border-color var(--dur-fast) var(--ease-calm), background var(--dur-fast) var(--ease-calm);
    }
    .search:hover { border-color: var(--border-2); }
    .search svg { width: 14px; height: 14px; }
    .search kbd {
      margin-left: auto;
      font-size: 11px; color: var(--fg-3);
      border: 1px solid var(--border-1);
      padding: 2px 6px; border-radius: 6px;
      background: var(--bg-surface);
      font-family: var(--font-sans);
    }
    .icon-btn {
      background: transparent;
      border: none;
      border-radius: 10px;
      padding: 9px; cursor: pointer;
      color: var(--fg-2);
      display: grid; place-items: center;
      transition: color var(--dur-fast) var(--ease-calm), background var(--dur-fast) var(--ease-calm);
    }
    .icon-btn:hover { color: var(--fg-1); background: var(--bg-inset); }
    .icon-btn svg { width: 16px; height: 16px; }

    /* ---------- Theme toggle ---------- */
    .theme-toggle {
      display: inline-flex; align-items: center; gap: 2px;
      padding: 3px;
      border-radius: 999px;
      background: var(--bg-inset);
    }
    .theme-toggle button {
      width: 28px; height: 28px;
      border-radius: 999px;
      border: none; background: transparent;
      cursor: pointer; color: var(--fg-3);
      display: grid; place-items: center;
      transition: all var(--dur-fast) var(--ease-calm);
    }
    .theme-toggle button.on {
      background: var(--bg-surface);
      color: var(--fg-1);
    }
    .theme-toggle button svg { width: 14px; height: 14px; }

    /* ---------- Page area ---------- */
    .page {
      padding: 32px 56px 96px;
      max-width: 1100px;
      width: 100%;
      box-sizing: border-box;
      margin: 0 auto;
    }

    /* ---------- Cinematic hero (one per page) ---------- */
    .hero {
      position: relative;
      width: 100%;
      height: 260px;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 36px;
    }
    .hero-meta {
      position: absolute;
      top: 24px; right: 28px;
      display: flex; align-items: center; gap: 10px;
      font-size: 13px;
      color: var(--fg-2);
      font-weight: 500;
    }
    .hero-meta .dot {
      width: 4px; height: 4px; border-radius: 999px;
      background: var(--fg-3);
    }
    .hero-mark {
      position: absolute;
      bottom: 28px; left: 32px;
      font-family: var(--font-display);
      font-size: 13px;
      color: var(--fg-2);
      font-style: italic;
      letter-spacing: 0.02em;
    }

    /* Hero gradients — designed placeholders, not stock photography. */
    .hero.dawn {
      background:
        radial-gradient(ellipse 90% 70% at 50% 110%, rgba(201, 125, 78, 0.22), transparent 60%),
        linear-gradient(180deg, #F4DBC2 0%, #EFD9C0 40%, #ECDCC4 100%);
    }
    .hero.morning {
      background:
        radial-gradient(ellipse 100% 80% at 50% 110%, rgba(122, 149, 184, 0.18), transparent 60%),
        linear-gradient(180deg, #DBE2EA 0%, #D8DEE6 60%, #D1D8E1 100%);
    }
    .hero.afternoon {
      background:
        radial-gradient(ellipse 70% 60% at 30% 30%, rgba(124, 155, 123, 0.20), transparent 60%),
        linear-gradient(180deg, #D8DECC 0%, #D2DAC6 50%, #CFD7C2 100%);
    }
    .hero.dusk {
      background:
        radial-gradient(ellipse 80% 60% at 80% 0%, rgba(201, 125, 78, 0.18), transparent 60%),
        linear-gradient(180deg, #E8D9C5 0%, #E1D2C0 50%, #D8C9B5 100%);
    }

    /* ---------- Headline (sits below the hero) ---------- */
    .page-head { margin-bottom: 48px; }
    .page-head .stamp {
      font-family: var(--font-sans);
      font-size: 12px; color: var(--fg-3);
      font-weight: 500;
      margin-bottom: 16px;
      letter-spacing: 0.04em;
    }
    .page-head h1 {
      font-family: var(--font-display);
      font-size: 56px;
      line-height: 1.02;
      letter-spacing: -0.03em;
      font-weight: 700;
      color: var(--fg-1);
      margin: 0;
    }
    .page-head h1 em {
      font-style: italic;
      font-weight: 400;
      color: var(--fg-3);
      display: block;
    }
    .page-head .sub {
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.6;
      color: var(--fg-2);
      margin-top: 20px;
      max-width: 540px;
      font-weight: 400;
    }
    .page-head-row {
      display: flex; align-items: flex-end; justify-content: space-between; gap: 32px;
      margin-bottom: 56px;
    }
    .page-head-row .page-head { margin-bottom: 0; flex: 1; }

    /* ---------- Buttons (softer, larger radius) ---------- */
    .btn {
      font-family: var(--font-sans);
      font-size: 14px; font-weight: 500;
      padding: 10px 18px;
      border-radius: 12px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease-calm), color var(--dur-fast) var(--ease-calm);
      display: inline-flex; align-items: center; gap: 8px;
      line-height: 1;
    }
    .btn svg { width: 14px; height: 14px; }
    .btn.primary {
      background: var(--primary);
      color: var(--fg-on-primary);
    }
    .btn.primary:hover { background: var(--primary-hover); }
    .btn.secondary {
      background: var(--bg-page);
      color: var(--fg-1);
      border-color: var(--border-1);
    }
    .btn.secondary:hover { background: var(--bg-surface-hover); }
    .btn.ghost {
      background: transparent;
      color: var(--fg-2);
    }
    .btn.ghost:hover { background: var(--bg-page); color: var(--fg-1); }
    .btn.sm { font-size: 13px; padding: 7px 14px; }
    .btn.lg { font-size: 15px; padding: 14px 24px; }

    /* ---------- Cards (bigger, softer, more generous) ---------- */
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border-1);
      border-radius: 18px;
      padding: 32px;
    }
    .card-hd {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 24px; gap: 16px;
    }
    .card-hd h3 {
      font-family: var(--font-display);
      font-size: 22px; line-height: 1.2;
      letter-spacing: -0.015em;
      font-weight: 600;
      color: var(--fg-1);
      margin: 0;
    }
    .card-hd .link {
      font-size: 13px;
      color: var(--fg-2);
      cursor: pointer;
      font-weight: 500;
    }
    .card-hd .link:hover { color: var(--fg-1); }

    /* ---------- Focus moment (one color moment per page) ---------- */
    .focus {
      background: var(--bg-surface);
      border: 1px solid var(--border-1);
      border-radius: 20px;
      padding: 40px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 40px;
      margin-bottom: 56px;
      position: relative;
      overflow: hidden;
    }
    .focus::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 50% 100% at 0% 50%, rgba(201, 125, 78, 0.10), transparent 70%);
      pointer-events: none;
    }
    .focus-text { position: relative; z-index: 1; }
    .focus .eyebrow {
      font-size: 12px;
      color: var(--fg-3);
      font-weight: 500;
      margin-bottom: 12px;
    }
    .focus h2 {
      font-family: var(--font-display);
      font-size: 32px;
      line-height: 1.18;
      letter-spacing: -0.02em;
      color: var(--fg-1);
      font-weight: 700;
      margin: 0;
      max-width: 540px;
    }
    .focus h2 em {
      font-style: italic;
      font-weight: 400;
      color: var(--fg-3);
    }
    .focus .meta {
      font-size: 13px; color: var(--fg-3);
      margin-top: 16px;
      font-weight: 400;
    }

    /* ---------- Metric tiles (neutralized — color removed) ---------- */
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 56px;
    }
    .metric {
      background: var(--bg-surface);
      border: 1px solid var(--border-1);
      border-radius: 18px;
      padding: 28px;
    }
    .metric .eyebrow {
      font-size: 12px;
      color: var(--fg-3);
      font-weight: 500;
      margin-bottom: 12px;
    }
    .metric .num {
      font-family: var(--font-display);
      font-size: 44px;
      line-height: 1;
      color: var(--fg-1);
      letter-spacing: -0.03em;
      font-weight: 600;
    }
    .metric .num small {
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--fg-3);
      margin-left: 6px;
      font-weight: 400;
      letter-spacing: 0;
    }
    .metric .delta {
      font-size: 12px;
      margin-top: 12px;
      color: var(--fg-3);
      font-weight: 400;
    }
    .metric .delta::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 999px;
      background: var(--fg-4);
      margin-right: 8px;
      vertical-align: middle;
    }
    .metric .delta.up::before { background: var(--success); }
    .metric .delta.down::before { background: var(--danger); }
    .metric .delta.flat::before { background: var(--fg-4); }

    /* ---------- Goal rows (no mono, softer color) ---------- */
    .goal-list { display: flex; flex-direction: column; }
    .goal-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border-1);
      cursor: pointer;
    }
    .goal-row:last-child { border: none; padding-bottom: 0; }
    .goal-row:first-child { padding-top: 0; }
    .goal-row:hover .title { color: var(--primary); }
    .check {
      width: 20px; height: 20px;
      border: 1.5px solid var(--border-2);
      border-radius: 8px;
      display: grid; place-items: center;
      cursor: pointer; flex-shrink: 0;
      background: transparent;
      transition: all var(--dur-fast) var(--ease-calm);
    }
    .check.done { background: var(--primary); border-color: var(--primary); }
    .check svg { width: 12px; height: 12px; color: var(--fg-on-primary); opacity: 0; transition: opacity var(--dur-fast) var(--ease-calm); }
    .check.done svg { opacity: 1; }
    .goal-row .title {
      font-size: 15px;
      color: var(--fg-1);
      font-weight: 400;
      transition: color var(--dur-fast) var(--ease-calm);
    }
    .goal-row.done .title {
      color: var(--fg-3);
      text-decoration: line-through;
      text-decoration-color: var(--fg-4);
    }
    .goal-row .meta {
      font-size: 13px;
      color: var(--fg-3);
      white-space: nowrap;
      font-weight: 400;
    }

    /* ---------- Badges (neutral, restrained) ---------- */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500;
      padding: 3px 10px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid var(--border-2);
      color: var(--fg-2);
    }
    .badge .dot {
      width: 6px; height: 6px;
      border-radius: 999px;
      background: var(--fg-3);
    }
    .badge.success .dot { background: var(--success); }
    .badge.info .dot    { background: var(--info); }
    .badge.warning .dot { background: var(--warning); }
    .badge.danger .dot  { background: var(--danger); }

    /* ---------- Two-up area ---------- */
    .two-up {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 56px;
    }

    /* ---------- Timeline ---------- */
    .timeline { padding: 24px 8px 12px; }
    .tl-track { position: relative; padding: 0 8px; }
    .tl-line { position: absolute; left: 8px; right: 8px; top: 22px; height: 1px; background: var(--border-2); }
    .tl-nodes { position: relative; display: grid; grid-template-columns: repeat(4, 1fr); }
    .tl-node { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .tl-dot {
      width: 14px; height: 14px;
      border-radius: 999px;
      background: var(--bg-surface);
      border: 1.5px solid var(--border-2);
      margin-top: 15px;
    }
    .tl-node.done .tl-dot { background: var(--primary); border-color: var(--primary); }
    .tl-node.now .tl-dot {
      background: var(--bg-surface);
      border: 2px solid var(--primary);
      width: 16px; height: 16px;
      margin-top: 14px;
    }
    .tl-label {
      font-size: 13px;
      color: var(--fg-2);
      text-align: center;
      font-weight: 500;
    }
    .tl-label strong {
      display: block;
      color: var(--fg-1);
      font-weight: 500;
    }
    .tl-node.now .tl-label strong { color: var(--primary); }
    .tl-meta {
      font-size: 12px;
      color: var(--fg-3);
      font-weight: 400;
      margin-top: 4px;
    }

    /* ---------- Long view chart ---------- */
    .horizon {
      background: var(--bg-surface);
      border: 1px solid var(--border-1);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 40px;
    }
    .horizon-grid {
      display: grid;
      grid-template-columns: 80px repeat(12, 1fr);
    }
    .horizon-grid .head {
      font-size: 12px;
      color: var(--fg-3);
      padding: 8px 4px 16px;
      text-align: center;
      font-weight: 500;
    }
    .horizon-grid .row-label {
      font-size: 13px;
      color: var(--fg-1);
      padding: 16px 12px 16px 0;
      border-right: 1px solid var(--border-1);
      font-weight: 500;
    }
    .horizon-grid .cell {
      border-bottom: 1px solid var(--border-1);
      height: 52px;
      position: relative;
    }
    .horizon-grid .row-label + .cell,
    .horizon-grid .row-label {
      border-top: 1px solid var(--border-1);
    }
    .horizon-grid .bar {
      position: absolute; top: 16px; bottom: 16px;
      background: var(--primary-tint);
      border: 1px solid var(--primary);
      border-radius: 10px;
      font-size: 12px;
      color: var(--fg-1);
      padding: 0 12px;
      display: flex; align-items: center;
      white-space: nowrap;
      font-weight: 500;
    }
    .horizon-grid .bar.muted {
      background: var(--bg-inset);
      border-color: var(--border-2);
      color: var(--fg-2);
      font-weight: 400;
    }
    .horizon-now {
      position: absolute; top: 0; bottom: 0;
      width: 1.5px; background: var(--primary);
      opacity: 0.5;
    }
    .horizon-now::after {
      content: 'today';
      position: absolute; top: -22px; left: 0;
      transform: translateX(-50%);
      font-size: 10px; color: var(--primary);
      padding: 2px 8px;
      background: var(--bg-surface);
      border-radius: 6px;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    /* ---------- Note (Up next, etc.) ---------- */
    .note {
      background: transparent;
      border: 1px solid var(--border-1);
      border-radius: 18px;
      padding: 24px;
    }
    .note .eyebrow {
      font-size: 12px;
      color: var(--fg-3);
      font-weight: 500;
      margin-bottom: 8px;
    }
    .note h4 {
      font-family: var(--font-display);
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: -0.015em;
      color: var(--fg-1);
      font-weight: 600;
      margin: 0;
    }
    .note h4 em {
      font-style: italic;
      font-weight: 400;
      color: var(--fg-3);
    }

    /* ---------- Goal cards (Goals page) ---------- */
    .goal-card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .goal-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-1);
      border-radius: 18px;
      padding: 28px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: flex-start;
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease-calm);
    }
    .goal-card:hover { background: var(--bg-surface-hover); }
    .goal-card .cat {
      font-size: 12px;
      color: var(--fg-3);
      font-weight: 500;
      margin-bottom: 8px;
    }
    .goal-card .gt {
      font-family: var(--font-display);
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: -0.015em;
      color: var(--fg-1);
      font-weight: 600;
      margin: 0 0 8px;
    }
    .goal-card .cadence {
      font-size: 13px;
      color: var(--fg-2);
      font-weight: 400;
    }
    .goal-card .next {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border-1);
      font-size: 13px;
      color: var(--fg-3);
      font-weight: 400;
    }

    /* ---------- Journal ---------- */
    .journal-cal {
      background: var(--bg-surface);
      border: 1px solid var(--border-1);
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .journal-cal-strip {
      display: grid;
      grid-template-columns: repeat(14, 1fr);
      gap: 8px;
    }
    .journal-cal-day {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .journal-cal-day .wk {
      font-size: 11px;
      color: var(--fg-3);
      font-weight: 500;
    }
    .journal-cal-day .pip {
      height: 42px;
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 12px; font-weight: 500;
      width: 100%;
    }
