<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); }
  .row { display: flex; gap: 20px; align-items: flex-end; justify-content: center; }
  figure { margin: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  figcaption { font-size: 12px; color: var(--fg-2); font-weight: 500; text-align: center; }
  figcaption strong { display: block; color: var(--fg-1); font-weight: 600; }
  figcaption .px { color: var(--fg-3); font-weight: 400; font-size: 11px; }

  .frame { background: var(--bg-surface); border: 1px solid var(--border-2); border-radius: 8px; overflow: hidden; }
  .bar { height: 8px; background: var(--bg-inset); border-bottom: 1px solid var(--border-1); }

  /* Desktop: sidebar + 3-col grid */
  .desktop { width: 220px; height: 132px; display: grid; grid-template-columns: 40px 1fr; }
  .desktop .side { background: var(--bg-inset); border-right: 1px solid var(--border-1); }
  .desktop .main { padding: 8px; }
  .desktop .hero { height: 28px; background: var(--primary-tint); border-radius: 4px; margin-bottom: 6px; }
  .desktop .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
  .desktop .tile { height: 28px; background: var(--bg-page); border: 1px solid var(--border-1); border-radius: 4px; }

  /* Tablet: single col, drawer hidden */
  .tablet { width: 150px; height: 132px; }
  .tablet .topbar { height: 14px; background: var(--bg-inset); border-bottom: 1px solid var(--border-1); display: flex; align-items: center; padding: 0 5px; gap: 3px; }
  .tablet .burger { width: 8px; height: 1.5px; background: var(--fg-2); box-shadow: 0 2px 0 var(--fg-2), 0 -2px 0 var(--fg-2); }
  .tablet .main { padding: 8px; }
  .tablet .hero { height: 26px; background: var(--primary-tint); border-radius: 4px; margin-bottom: 6px; }
  .tablet .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .tablet .tile { height: 26px; background: var(--bg-page); border: 1px solid var(--border-1); border-radius: 4px; }

  /* Phone: stacked + bottom tab bar */
  .phone { width: 74px; height: 132px; display: flex; flex-direction: column; }
  .phone .topbar { height: 12px; background: var(--bg-inset); border-bottom: 1px solid var(--border-1); }
  .phone .main { flex: 1; padding: 6px; }
  .phone .hero { height: 22px; background: var(--primary-tint); border-radius: 4px; margin-bottom: 5px; }
  .phone .stack { display: flex; flex-direction: column; gap: 4px; }
  .phone .tile { height: 14px; background: var(--bg-page); border: 1px solid var(--border-1); border-radius: 3px; }
  .phone .tabbar { height: 16px; background: var(--bg-inset); border-top: 1px solid var(--border-1); display: flex; }
  .phone .tabbar i { flex: 1; }
  .phone .tabbar i:first-child { box-shadow: inset 0 0 0 1px transparent; }
  .phone .tabbar .dot { width: 4px; height: 4px; border-radius: 999px; background: var(--primary); margin: 6px auto; }
</style></head>
<body>
  <div class="row">
    <figure>
      <div class="frame desktop">
        <div class="side"></div>
        <div class="main"><div class="hero"></div><div class="grid"><div class="tile"></div><div class="tile"></div><div class="tile"></div></div></div>
      </div>
      <figcaption><strong>Desktop</strong><span class="px">≥ 1024 · sidebar + 3-up</span></figcaption>
    </figure>

    <figure>
      <div class="frame tablet">
        <div class="topbar"><div class="burger"></div></div>
        <div class="main"><div class="hero"></div><div class="grid"><div class="tile"></div><div class="tile"></div></div></div>
      </div>
      <figcaption><strong>Tablet</strong><span class="px">768–1023 · drawer + 2-up</span></figcaption>
    </figure>

    <figure>
      <div class="frame phone">
        <div class="topbar"></div>
        <div class="main"><div class="hero"></div><div class="stack"><div class="tile"></div><div class="tile"></div></div></div>
        <div class="tabbar"><i><div class="dot"></div></i><i></i><i></i><i></i></div>
      </div>
      <figcaption><strong>Phone</strong><span class="px">&lt; 768 · stack + tab bar</span></figcaption>
    </figure>
  </div>
</body></html>
