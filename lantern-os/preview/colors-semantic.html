<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); }
  .grid { display: grid; grid-template-columns: repeat(var(--cols, 4), 1fr); gap: 12px; }
  .sw { border: 1px solid var(--border-1); border-radius: var(--radius-2); padding: 12px; background: var(--bg-surface); }
  .chip { height: 56px; border-radius: var(--radius-1); border: 1px solid var(--border-1); }
  .name { margin-top: 10px; font-size: 12px; color: var(--fg-1); font-weight: 500; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 2px; }
</style></head>
<body>
  <div class="grid" style="--cols:4">
    <div class="sw"><div class="chip" style="background:#5E8060"></div><div class="name">success</div><div class="hex">#5E8060</div></div>
    <div class="sw"><div class="chip" style="background:#7A95B8"></div><div class="name">info</div><div class="hex">#7A95B8</div></div>
    <div class="sw"><div class="chip" style="background:#B58F4E"></div><div class="name">warning</div><div class="hex">#B58F4E</div></div>
    <div class="sw"><div class="chip" style="background:#A14538"></div><div class="name">danger</div><div class="hex">#A14538</div></div>
  </div>
</body></html>
