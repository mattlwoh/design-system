<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); }
  .grid { display: grid; grid-template-columns: repeat(var(--cols, 4), 1fr); gap: 12px; }
  .sw { border: 1px solid var(--border-1); border-radius: var(--radius-2); padding: 12px; background: var(--bg-surface); }
  .chip { height: 56px; border-radius: var(--radius-1); border: 1px solid var(--border-1); }
  .name { margin-top: 10px; font-size: 12px; color: var(--fg-1); font-weight: 500; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 2px; }
</style></head>
<body>
  <div class="grid" style="--cols:4">
    <div class="sw"><div class="chip" style="background:#C97D4E"></div><div class="name">primary · copper</div><div class="hex">#C97D4E</div></div>
    <div class="sw"><div class="chip" style="background:#F4E1CB"></div><div class="name">primary tint</div><div class="hex">#F4E1CB</div></div>
    <div class="sw"><div class="chip" style="background:#7C9B7B"></div><div class="name">secondary · sage</div><div class="hex">#7C9B7B</div></div>
    <div class="sw"><div class="chip" style="background:#E2EADD"></div><div class="name">secondary tint</div><div class="hex">#E2EADD</div></div>
  </div>
</body></html>
