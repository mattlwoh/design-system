<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border: 1px solid var(--border-1); border-radius: var(--radius-2); padding: 12px; background: var(--bg-surface); }
  .chip { height: 56px; border-radius: var(--radius-1); border: 1px solid var(--border-1); }
  .chip.pattern {
    background-color: #FAFAF7;
    background-image: radial-gradient(circle at center, rgba(42, 37, 32, 0.06) 1px, transparent 1.4px);
    background-size: 20px 20px;
  }
  .name { margin-top: 10px; font-size: 12px; color: var(--fg-1); font-weight: 500; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 2px; }
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip pattern"></div><div class="name">page · pattern</div><div class="hex">#FAFAF7 + dots</div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="name">surface</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="name">raised</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:#F0F0EB"></div><div class="name">inset</div><div class="hex">#F0F0EB</div></div>
  </div>
</body></html>
