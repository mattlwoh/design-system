<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); display: grid; gap: 14px; }
  .row {
    display: grid;
    grid-template-columns: 110px 1fr auto;
    gap: 18px;
    align-items: baseline;
    padding: 10px 16px;
    background: var(--bg-surface);
    border: 1px solid var(--border-1);
    border-radius: var(--radius-2);
  }
  .key {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-3);
    text-transform: lowercase;
    letter-spacing: 0.02em;
  }
  .val {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--fg-1);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }
  .meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-3);
  }
  .hl { color: var(--primary); }
</style></head>
<body>
  <div class="row">
    <span class="key">timestamp</span>
    <span class="val">2026-04-14 · 10:42:08 <span class="hl">PDT</span></span>
    <span class="meta">ISO + zone</span>
  </div>
  <div class="row">
    <span class="key">commit</span>
    <span class="val">a4f3c91 · main</span>
    <span class="meta">hash + branch</span>
  </div>
  <div class="row">
    <span class="key">latitude</span>
    <span class="val">37.7749° N · -122.4194° W</span>
    <span class="meta">tabular-nums</span>
  </div>
  <div class="row">
    <span class="key">token</span>
    <span class="val">--bg-page: #F4EDDB;</span>
    <span class="meta">code · vars</span>
  </div>
</body></html>
