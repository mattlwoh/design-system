<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; }
  .row { display: grid; grid-template-columns: 130px 1fr; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--border-1); align-items: baseline; }
  .row:last-child { border: none; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
</style></head>
<body>
  <div class="row"><div class="meta">h1 · 32/1.18 · 700</div><h1>This year, in view</h1></div>
  <div class="row"><div class="meta">h2 · 24/1.22 · 700</div><h2>This quarter's <em style="font-weight:500;color:var(--fg-3)">focus</em></h2></div>
  <div class="row"><div class="meta">h3 · 20/1.30 · 600</div><h3>This week ahead</h3></div>
  <div class="row"><div class="meta">h4 · 17/1.35 sans</div><h4>Today's three things</h4></div>
</body></html>
