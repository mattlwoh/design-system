<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .panel { background: var(--bg-surface); border: 1px solid var(--border-1); border-radius: var(--radius-2); padding: 18px; }
  .name { font-weight: 500; font-size: 13px; color: var(--fg-1); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 4px; }
  .track { margin-top: 14px; height: 4px; background: var(--bg-inset); border-radius: 999px; position: relative; overflow: hidden; }
  .dot { position: absolute; top: -4px; width: 12px; height: 12px; border-radius: 999px; background: var(--primary); }
  .fast .dot { animation: glide 1.2s var(--ease-calm) infinite; }
  .base .dot { animation: glide 1.8s var(--ease-calm) infinite; }
  .slow .dot { animation: glide 2.4s var(--ease-calm) infinite; }
  @keyframes glide { 0% { left: 0 } 45% { left: calc(100% - 12px) } 55% { left: calc(100% - 12px) } 100% { left: 0 } }
</style></head>
<body>
  <div class="panel fast"><div class="name">fast</div><div class="meta">120ms · hovers</div><div class="track"><div class="dot"></div></div></div>
  <div class="panel base"><div class="name">base</div><div class="meta">200ms · state</div><div class="track"><div class="dot"></div></div></div>
  <div class="panel slow"><div class="name">slow</div><div class="meta">280ms · layout</div><div class="track"><div class="dot"></div></div></div>
</body></html>
