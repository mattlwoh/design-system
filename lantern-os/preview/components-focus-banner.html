<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); display: grid; gap: 12px; }
  .banner { background: var(--primary-tint); border: 1px solid var(--primary); border-radius: var(--radius-2); padding: 18px 22px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .b-secondary { background: var(--secondary-tint); border-color: var(--secondary); }
  .text { display: grid; gap: 4px; }
  .eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-2); }
  .head { font-family: var(--font-display); font-size: 22px; color: var(--fg-1); line-height: 1.2; letter-spacing: -0.01em; }
  .meta { font-size: 12px; color: var(--fg-2); }
  .cta { font-size: 13px; font-weight: 500; color: var(--fg-1); border-bottom: 1px solid currentColor; padding-bottom: 1px; cursor: pointer; flex-shrink: 0; }
</style></head>
<body>
  <div class="banner">
    <div class="text">
      <div class="eyebrow">Today's focus</div>
      <div class="head">Write before lunch.</div>
      <div class="meta">Two of three weekly goals on track.</div>
    </div>
    <div class="cta">Begin →</div>
  </div>
  <div class="banner b-secondary">
    <div class="text">
      <div class="eyebrow">A note for the week</div>
      <div class="head">A steady pace beats a sprint.</div>
    </div>
  </div>
</body></html>
