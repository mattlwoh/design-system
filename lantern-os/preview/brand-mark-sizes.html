<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 36px; background: var(--bg-page); display: flex; align-items: flex-end; justify-content: center; gap: 40px; min-height: 200px; }
  figure { margin: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  figcaption { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
  figure img { display: block; }
</style></head>
<body>
  <figure><img src="../assets/logo/lantern-os-mark.svg" width="24" height="24"><figcaption>24</figcaption></figure>
  <figure><img src="../assets/logo/lantern-os-mark.svg" width="40" height="40"><figcaption>40</figcaption></figure>
  <figure><img src="../assets/logo/lantern-os-mark.svg" width="64" height="64"><figcaption>64</figcaption></figure>
  <figure><img src="../assets/logo/lantern-os-mark.svg" width="96" height="96"><figcaption>96</figcaption></figure>
  <figure><img src="../assets/logo/lantern-os-mark.svg" width="128" height="128"><figcaption>128</figcaption></figure>
</body></html>
