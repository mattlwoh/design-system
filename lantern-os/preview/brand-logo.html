<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>

  .panel.dark { background: #16182A; border-color: #2D3145; }
  .panel img, .panel svg { display: block; height: 72px; width: auto; }
</style></head>

  <div class="panel"><img src="../assets/logo/lantern-os-wordmark.svg" alt="Lantern OS"></div>

  <line x1="12.69" y1="12.69" x2="8.44" y2="8.44" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="24.00" y1="8.00" x2="24.00" y2="2.00" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="35.31" y1="12.69" x2="39.56" y2="8.44" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <circle cx="24" cy="24" r="7" fill="#C97D4E"/>
    </g>
    <text x="68" y="42" font-family="'Instrument Serif',Georgia,serif" font-size="32" fill="currentColor" letter-spacing="-0.5">Lantern OS</text>
  </svg></div>
