<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; align-items: stretch; }
  .demo { background: var(--bg-surface); padding: 20px; min-height: 96px; display: flex; flex-direction: column; justify-content: flex-end; gap: 6px; border-radius: var(--radius-2); }
  .demo.a { border: 1px solid var(--border-1); }
  .demo.b { border: 1px solid var(--primary); }
  .demo.c { box-shadow: 0 1px 2px rgba(42,42,38,0.04), 0 0 0 1px rgba(42,42,38,0.04); background: var(--bg-raised); }
  .name { font-weight: 500; font-size: 13px; color: var(--fg-1); }
  .desc { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
</style></head>
<body>
  <div class="demo a"><div class="name">Default card</div><div class="desc">1px border-1</div></div>
  <div class="demo b"><div class="name">Selected card</div><div class="desc">1px primary, no glow</div></div>
  <div class="demo c"><div class="name">Popover only</div><div class="desc">shadow-1 · rare</div></div>
</body></html>
