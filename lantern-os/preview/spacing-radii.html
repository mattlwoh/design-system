<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 36px; background: var(--bg-page); display: flex; gap: 32px; align-items: center; justify-content: center; min-height: 200px; }
  figure { margin: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .sq { width: 88px; height: 88px; background: var(--bg-surface); border: 1px solid var(--border-2); }
  figcaption { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: center; }
  strong { color: var(--fg-1); display: block; font-family: var(--font-sans); font-weight: 500; font-size: 12px; margin-bottom: 2px; }
</style></head>
<body>
  <figure><div class="sq" style="border-radius:0"></div><figcaption><strong>radius-0</strong>0px · rules</figcaption></figure>
  <figure><div class="sq" style="border-radius:4px"></div><figcaption><strong>radius-1</strong>4px · chips</figcaption></figure>
  <figure><div class="sq" style="border-radius:8px"></div><figcaption><strong>radius-2</strong>8px · cards</figcaption></figure>
  <figure><div class="sq" style="border-radius:12px"></div><figcaption><strong>radius-3</strong>12px · hero</figcaption></figure>
  <figure><div class="sq" style="border-radius:16px"></div><figcaption><strong>radius-4</strong>16px · banner</figcaption></figure>
  <figure><div class="sq" style="border-radius:999px;width:32px;height:32px"></div><figcaption><strong>pill</strong>dots / avatars</figcaption></figure>
</body></html>
