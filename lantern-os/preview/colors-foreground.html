<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); }
  .grid { display: grid; grid-template-columns: repeat(var(--cols, 4), 1fr); gap: 12px; }
  .sw { border: 1px solid var(--border-1); border-radius: var(--radius-2); padding: 12px; background: var(--bg-surface); }
  .chip { height: 56px; border-radius: var(--radius-1); border: 1px solid var(--border-1); }
  .name { margin-top: 10px; font-size: 12px; color: var(--fg-1); font-weight: 500; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 2px; }
</style></head>
<body>
  <div class="grid" style="--cols:4">
    <div class="sw"><div class="chip" style="background:#2A2520"></div><div class="name">fg-1 · primary</div><div class="hex">#2A2520</div></div>
    <div class="sw"><div class="chip" style="background:#6B6358"></div><div class="name">fg-2 · secondary</div><div class="hex">#6B6358</div></div>
    <div class="sw"><div class="chip" style="background:#9B9485"></div><div class="name">fg-3 · tertiary</div><div class="hex">#9B9485</div></div>
    <div class="sw"><div class="chip" style="background:#C2BCAB"></div><div class="name">fg-4 · disabled</div><div class="hex">#C2BCAB</div></div>
  </div>
</body></html>
