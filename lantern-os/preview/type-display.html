<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; }
  .stack { display: grid; gap: 18px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .specimen { color: var(--fg-1); }
  .pair { font-family: var(--font-display); font-size: 54px; line-height: 1.05; letter-spacing: -0.025em; font-weight: 700; }
  .pair em { font-style: italic; font-weight: 500; color: var(--fg-3); }
</style></head>
<body>
  <div class="stack">
    <div>
      <div class="label">display · Newsreader 700 + italic 500 · 54 / 1.05</div>
      <div class="specimen pair">Building things<br><em>that actually ship.</em></div>
    </div>
  </div>
</body></html>
