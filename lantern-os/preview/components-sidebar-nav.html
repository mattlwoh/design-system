<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: var(--bg-page); }
  .sb { width: 240px; background: var(--bg-surface); border: 1px solid var(--border-1); border-radius: var(--radius-2); padding: 10px; }
  .group { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); padding: 10px 12px 6px; }
  .item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 10px; font-size: 14px; color: var(--fg-2); cursor: pointer; transition: background 120ms; }
  .item:hover { background: var(--bg-surface-hover); color: var(--fg-1); }
  .item.active { background: var(--primary-tint); color: var(--fg-1); font-weight: 500; }
  .item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .count { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .item.active .count { color: var(--primary); }
</style></head>
<body>
  <div class="sb">
    <div class="group">Plan</div>
    <div class="item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>Today<span class="count">3</span></div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>This week<span class="count">8</span></div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 14h18"/></svg>Long view</div>
    <div class="group">Track</div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>Goals<span class="count">12</span></div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>Habits<span class="count">5</span></div>
  </div>
</body></html>
