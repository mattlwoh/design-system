<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .m { background: var(--bg-surface); border: 1px solid var(--border-1); border-radius: var(--radius-2); padding: 20px; display: grid; gap: 6px; }
  .eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .num { font-variant-numeric: tabular-nums; font-size: 32px; color: var(--fg-1); letter-spacing: -0.02em; font-weight: 600; }
  .num small { font-size: 14px; color: var(--fg-3); margin-left: 4px; font-weight: 400; }
  .delta { font-size: 12px; font-weight: 500; }
  .delta.up { color: var(--success); }
  .delta.flat { color: var(--fg-3); }
  .delta.down { color: var(--danger); }
</style></head>
<body>
  <div class="m"><div class="eyebrow">Weekly goals</div><div class="num">2<small>/ 3</small></div><div class="delta up">+1 this week</div></div>
  <div class="m"><div class="eyebrow">Habits kept</div><div class="num">21<small>days</small></div><div class="delta flat">steady</div></div>
  <div class="m"><div class="eyebrow">Hours focused</div><div class="num">12.5<small>h</small></div><div class="delta down">−2.0 vs last</div></div>
</body></html>
