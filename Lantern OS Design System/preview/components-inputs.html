<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { display: grid; gap: 6px; }
  label { font-size: 12px; color: var(--fg-2); font-weight: 500; }
  input, textarea, select { font-family: var(--font-sans); font-size: 14px; padding: 8px 12px; border: 1px solid var(--border-2); border-radius: var(--radius-1); background: var(--bg-surface); color: var(--fg-1); outline: none; }
  input:focus, textarea:focus { border-color: var(--primary); }
  .hint { font-size: 11px; color: var(--fg-3); }
  .error input { border-color: var(--danger); }
  .error .hint { color: var(--danger); }
</style></head>
<body>
  <div class="field"><label>Goal title</label><input value="Read 12 books"><div class="hint">Tap enter to save</div></div>
  <div class="field"><label>Target date</label><input value="December 31, 2026"><div class="hint">Optional</div></div>
  <div class="field"><label>Category</label><select><option>Personal · Habits</option></select></div>
  <div class="field error"><label>Streak</label><input value=""><div class="hint">A streak needs a daily target</div></div>
</body></html>
