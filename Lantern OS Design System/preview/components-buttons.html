<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg-page); display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .btn { font-family: var(--font-sans); font-size: 14px; font-weight: 500; padding: 8px 16px; border-radius: var(--radius-2); border: 1px solid transparent; cursor: pointer; transition: background var(--dur-fast) var(--ease-calm); }
  .btn.primary { background: var(--primary); color: var(--fg-on-primary); }
  .btn.primary:hover { background: var(--primary-hover); }
  .btn.secondary { background: var(--bg-surface); color: var(--fg-1); border-color: var(--border-2); }
  .btn.secondary:hover { background: var(--bg-surface-hover); }
  .btn.ghost { background: transparent; color: var(--fg-1); }
  .btn.ghost:hover { background: var(--bg-surface-hover); }
  .btn.danger { background: var(--bg-surface); color: var(--danger); border-color: var(--border-2); }
  .btn.disabled { opacity: 0.5; cursor: not-allowed; background: var(--primary); color: var(--fg-on-primary); }
  .btn.sm { font-size: 12px; padding: 4px 10px; }
  .btn.lg { font-size: 15px; padding: 12px 20px; }
</style></head>
<body>
  <button class="btn primary">Plan the week</button>
  <button class="btn secondary">Save draft</button>
  <button class="btn ghost">Cancel</button>
  <button class="btn danger">Remove goal</button>
  <button class="btn disabled">Disabled</button>
  <span style="width:100%;height:1px;background:var(--border-1);margin:4px 0"></span>
  <button class="btn primary sm">Small</button>
  <button class="btn primary">Default</button>
  <button class="btn primary lg">Large</button>
</body></html>
