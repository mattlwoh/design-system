<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); }
  .grid { display: grid; grid-template-columns: repeat(var(--cols, 4), 1fr); gap: 12px; }
  .sw { border: 1px solid var(--border-1); border-radius: var(--radius-2); padding: 12px; background: var(--bg-surface); }
  .chip { height: 56px; border-radius: var(--radius-1); border: 1px solid var(--border-1); }
  .name { margin-top: 10px; font-size: 12px; color: var(--fg-1); font-weight: 500; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 2px; }

  body { background: #16182A; }
  .sw { background: #1D2034; border-color: #2D3145; }
  .name { color: #E8E6DF; }
  .hex { color: #6F7388; }
  .chip { border-color: #2D3145; }
</style></head>
<body>
  <div class="grid" style="--cols:5">
    <div class="sw"><div class="chip" style="background:#16182A"></div><div class="name">page</div><div class="hex">#16182A</div></div>
    <div class="sw"><div class="chip" style="background:#1D2034"></div><div class="name">surface</div><div class="hex">#1D2034</div></div>
    <div class="sw"><div class="chip" style="background:#E0A07A"></div><div class="name">primary · lit copper</div><div class="hex">#E0A07A</div></div>
    <div class="sw"><div class="chip" style="background:#9BC4B0"></div><div class="name">secondary · mint</div><div class="hex">#9BC4B0</div></div>
    <div class="sw"><div class="chip" style="background:#E8E6DF"></div><div class="name">fg-1</div><div class="hex">#E8E6DF</div></div>
  </div>
</body></html>
