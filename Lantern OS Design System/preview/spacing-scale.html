<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); }
  .row { display: grid; grid-template-columns: 80px 1fr 80px; gap: 12px; align-items: center; padding: 4px 0; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .bar { background: var(--primary); height: 12px; border-radius: 1px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); text-align: right; }
</style></head>
<body>
  <div class="row"><div class="name">space-1</div><div class="bar" style="width:8px;max-width:100%"></div><div class="px">4px</div></div><div class="row"><div class="name">space-2</div><div class="bar" style="width:16px;max-width:100%"></div><div class="px">8px</div></div><div class="row"><div class="name">space-3</div><div class="bar" style="width:24px;max-width:100%"></div><div class="px">12px</div></div><div class="row"><div class="name">space-4</div><div class="bar" style="width:32px;max-width:100%"></div><div class="px">16px</div></div><div class="row"><div class="name">space-5</div><div class="bar" style="width:40px;max-width:100%"></div><div class="px">20px</div></div><div class="row"><div class="name">space-6</div><div class="bar" style="width:48px;max-width:100%"></div><div class="px">24px</div></div><div class="row"><div class="name">space-7</div><div class="bar" style="width:64px;max-width:100%"></div><div class="px">32px</div></div><div class="row"><div class="name">space-8</div><div class="bar" style="width:80px;max-width:100%"></div><div class="px">40px</div></div><div class="row"><div class="name">space-9</div><div class="bar" style="width:96px;max-width:100%"></div><div class="px">48px</div></div><div class="row"><div class="name">space-10</div><div class="bar" style="width:128px;max-width:100%"></div><div class="px">64px</div></div>
</body></html>
